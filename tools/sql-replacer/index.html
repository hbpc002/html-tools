<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL字符替换工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: #4a90d9;
            border-radius: 2px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: #4a90d9;
        }
        .rules-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .rule-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 6px;
            border: 1px solid #e9ecef;
        }
        .rule-label {
            font-weight: 500;
            color: #495057;
            min-width: 30px;
        }
        .rule-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
        }
        .rule-input:focus {
            outline: none;
            border-color: #4a90d9;
        }
        .arrow {
            color: #6c757d;
            font-weight: bold;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #4a90d9;
            color: white;
        }
        .btn-primary:hover {
            background: #357abd;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-success:hover {
            background: #218838;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        .stats {
            margin-top: 15px;
            padding: 12px;
            background: #e7f3ff;
            border-radius: 6px;
            font-size: 14px;
            color: #333;
        }
        .regex-hint {
            margin-top: 10px;
            padding: 10px;
            background: #fff3cd;
            border-radius: 6px;
            font-size: 13px;
            color: #856404;
        }
        .regex-hint label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .regex-hint input {
            width: 16px;
            height: 16px;
        }
        .highlight-box {
            background: #1e1e1e;
            border-radius: 6px;
            padding: 15px;
            overflow-x: auto;
            max-height: 400px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .highlight-box .replace-from {
            padding: 1px 3px;
            border-radius: 3px;
            text-decoration: underline;
            text-decoration-style: dotted;
        }
        .highlight-box .replace-to {
            padding: 1px 3px;
            border-radius: 3px;
            font-weight: bold;
        }
        .color-0 { background: #ff6b6b; color: #000; }
        .color-1 { background: #4ecdc4; color: #000; }
        .color-2 { background: #ffe66d; color: #000; }
        .color-3 { background: #95e1d3; color: #000; }
        .color-4 { background: #f38181; color: #000; }
        .color-5 { background: #aa96da; color: #000; }
        .color-6 { background: #fcbad3; color: #000; }
        .color-7 { background: #a8d8ea; color: #000; }
        .color-8 { background: #ff9a3c; color: #000; }
        .color-9 { background: #b8f2e6; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SQL字符替换工具</h1>
        
        <div class="card">
            <div class="card-title">原始SQL语句</div>
            <textarea id="inputSql" placeholder="在此粘贴您的SQL语句..."></textarea>
        </div>
        
        <div class="card">
            <div class="card-title">替换规则</div>
            <div class="rules-container" id="rulesContainer">
                <div class="rule-item">
                    <span class="rule-label">1</span>
                    <input type="text" class="rule-input from" placeholder="原字符">
                    <span class="arrow">→</span>
                    <input type="text" class="rule-input to" placeholder="替换为">
                </div>
                <div class="rule-item">
                    <span class="rule-label">2</span>
                    <input type="text" class="rule-input from" placeholder="原字符">
                    <span class="arrow">→</span>
                    <input type="text" class="rule-input to" placeholder="替换为">
                </div>
                <div class="rule-item">
                    <span class="rule-label">3</span>
                    <input type="text" class="rule-input from" placeholder="原字符">
                    <span class="arrow">→</span>
                    <input type="text" class="rule-input to" placeholder="替换为">
                </div>
                <div class="rule-item">
                    <span class="rule-label">4</span>
                    <input type="text" class="rule-input from" placeholder="原字符">
                    <span class="arrow">→</span>
                    <input type="text" class="rule-input to" placeholder="替换为">
                </div>
                <div class="rule-item">
                    <span class="rule-label">5</span>
                    <input type="text" class="rule-input from" placeholder="原字符">
                    <span class="arrow">→</span>
                    <input type="text" class="rule-input to" placeholder="替换为">
                </div>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-primary" onclick="addRule()">+ 添加规则</button>
                <button class="btn btn-secondary" onclick="clearRules()">清空规则</button>
            </div>
            
            <div class="regex-hint">
                <label>
                    <input type="checkbox" id="useRegex">
                    启用正则表达式匹配
                </label>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-success" onclick="replace()">执行替换</button>
                <button class="btn btn-secondary" onclick="copyResult()">复制结果</button>
            </div>
            
            <div class="stats" id="stats"></div>
        </div>
        
        <div class="card">
            <div class="card-title">替换结果（高亮预览）</div>
            <div class="highlight-box" id="highlightPreview"></div>
        </div>
        
        <div class="card">
            <div class="card-title">替换结果（纯文本）</div>
            <textarea id="outputSql" placeholder="替换后的SQL将显示在此处..."></textarea>
        </div>
    </div>

    <script>
        let ruleCount = 5;
        
        function addRule() {
            ruleCount++;
            const container = document.getElementById('rulesContainer');
            const div = document.createElement('div');
            div.className = 'rule-item';
            div.innerHTML = `
                <span class="rule-label">${ruleCount}</span>
                <input type="text" class="rule-input from" placeholder="原字符">
                <span class="arrow">→</span>
                <input type="text" class="rule-input to" placeholder="替换为">
            `;
            container.appendChild(div);
        }
        
        function clearRules() {
            const container = document.getElementById('rulesContainer');
            container.innerHTML = '';
            ruleCount = 0;
            addRule();
            addRule();
            addRule();
            addRule();
            addRule();
        }
        
        function getRules() {
            const rules = [];
            const fromInputs = document.querySelectorAll('.rule-input.from');
            const toInputs = document.querySelectorAll('.rule-input.to');
            
            fromInputs.forEach((input, index) => {
                if (input.value) {
                    rules.push({
                        from: input.value,
                        to: toInputs[index].value
                    });
                }
            });
            
            return rules;
        }
        
        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;')
                       .replace(/</g, '&lt;')
                       .replace(/>/g, '&gt;')
                       .replace(/"/g, '&quot;')
                       .replace(/'/g, '&#039;');
        }
        
        function replace() {
            const inputSql = document.getElementById('inputSql').value;
            const useRegex = document.getElementById('useRegex').checked;
            const rules = getRules();
            
            if (!inputSql) {
                alert('请输入SQL语句');
                return;
            }
            
            if (rules.length === 0) {
                alert('请至少添加一个替换规则');
                return;
            }
            
            let result = inputSql;
            let resultHtml = escapeHtml(inputSql);
            let totalReplacements = 0;
            
            rules.forEach((rule, index) => {
                const colorClass = `color-${index % 10}`;
                if (useRegex) {
                    try {
                        const regex = new RegExp(rule.from, 'g');
                        const matches = result.match(regex);
                        const count = matches ? matches.length : 0;
                        result = result.replace(regex, rule.to);
                        resultHtml = resultHtml.replace(regex, (match) => {
                            return `<span class="replace-from ${colorClass}">${escapeHtml(match)}</span><span class="replace-to ${colorClass}">${escapeHtml(rule.to)}</span>`;
                        });
                        totalReplacements += count;
                    } catch (e) {
                        console.error('正则表达式错误:', e);
                    }
                } else {
                    let count = 0;
                    const from = rule.from;
                    const to = rule.to;
                    let idx = 0;
                    while ((idx = result.indexOf(from, idx)) !== -1) {
                        count++;
                        idx += from.length;
                    }
                    result = result.split(from).join(to);
                    
                    const fromEscaped = escapeHtml(from);
                    const toEscaped = escapeHtml(to);
                    const parts = resultHtml.split(fromEscaped);
                    resultHtml = parts.join(`<span class="replace-from ${colorClass}">${fromEscaped}</span><span class="replace-to ${colorClass}">${toEscaped}</span>`);
                    
                    totalReplacements += count;
                }
            });
            
            document.getElementById('outputSql').value = result;
            document.getElementById('highlightPreview').innerHTML = resultHtml;
            document.getElementById('stats').textContent = `✅ 完成！共替换 ${totalReplacements} 处，涉及 ${rules.length} 条规则`;
        }
        
        function copyResult() {
            const output = document.getElementById('outputSql').value;
            if (!output) {
                alert('没有可复制的内容');
                return;
            }
            
            navigator.clipboard.writeText(output).then(() => {
                alert('已复制到剪贴板');
            }).catch(() => {
                const textarea = document.getElementById('outputSql');
                textarea.select();
                document.execCommand('copy');
                alert('已复制到剪贴板');
            });
        }
    </script>
</body>
</html>

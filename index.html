<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tools Registry</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; }
        .navbar { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-size: 18px; font-weight: 600; color: #1a1a1a; }
        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-link { color: #666; text-decoration: none; font-size: 14px; transition: color 0.2s; cursor: pointer; }
        .nav-link:hover, .nav-link.active { color: #1890ff; }
        .lang-btn { padding: 6px 12px; border: 1px solid #d9d9d9; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; }
        .main { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .hero { text-align: center; margin-bottom: 32px; }
        .hero h1 { font-size: 28px; color: #1a1a1a; margin-bottom: 8px; }
        .hero p { color: #666; font-size: 14px; }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
        .tool-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 20px; transition: all 0.2s; cursor: pointer; }
        .tool-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: translateY(-2px); }
        .tool-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .tool-name { font-size: 16px; font-weight: 600; color: #1a1a1a; }
        .tool-version { font-size: 12px; color: #999; background: #f5f5f5; padding: 2px 8px; border-radius: 10px; }
        .tool-desc { font-size: 14px; color: #666; margin-bottom: 12px; line-height: 1.5; }
        .tool-meta { display: flex; gap: 16px; font-size: 12px; color: #999; margin-bottom: 12px; }
        .tool-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .tag { background: #e6f7ff; color: #1890ff; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .preview-area { background: #fff; border-radius: 8px; margin-top: 16px; height: 500px; display: none; }
        .preview-area.active { display: block; }
        .preview-header { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; background: #fafafa; border-radius: 8px 8px 0 0; }
        .preview-title { font-weight: 500; }
        .btn-open { padding: 6px 12px; background: #1890ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; text-decoration: none; display: inline-block; }
        .preview-iframe { width: 100%; height: 460px; border: none; border-radius: 0 0 8px 8px; }
        .empty { text-align: center; padding: 48px; color: #999; grid-column: 1 / -1; }
        .form-card { background: #fff; border-radius: 8px; padding: 24px; max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #333; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; }
        .form-group textarea { font-family: monospace; resize: vertical; }
        .btn-primary { padding: 10px 20px; background: #1890ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-success { padding: 10px 20px; background: #52c41a; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .patch-output { display: none; margin-top: 20px; }
        .patch-output textarea { width: 100%; height: 300px; font-family: monospace; }
        .about-page { text-align: center; padding: 48px 24px; }
        .about-page p { max-width: 600px; margin: 0 auto; line-height: 1.8; color: #666; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand" id="appName">HTML Tools Registry</div>
        <div class="nav-links">
            <a class="nav-link active" data-page="home" onclick="showPage('home')" id="navTools">Tools</a>
            <a class="nav-link" data-page="add" onclick="showPage('add')" id="navAdd">Add Tool</a>
            <a class="nav-link" data-page="about" onclick="showPage('about')" id="navAbout">About</a>
            <button class="lang-btn" onclick="toggleLang()" id="langToggle">中文</button>
        </div>
    </nav>

    <main class="main">
        <!-- Home Page -->
        <div id="pageHome">
            <div class="hero">
                <h1 id="heroTitle">HTML Tools Registry</h1>
                <p id="heroDesc">Single-file HTML tools collection</p>
            </div>
            <div class="tools-grid" id="toolsGrid"></div>
            <div class="preview-area" id="previewArea">
                <div class="preview-header">
                    <span class="preview-title" id="previewTitle">Preview</span>
                    <a class="btn-open" id="btnOpen" target="_blank">Open</a>
                </div>
                <iframe class="preview-iframe" id="previewIframe"></iframe>
            </div>
        </div>

        <!-- Add Tool Page -->
        <div id="pageAdd" style="display:none;">
            <div class="hero">
                <h1 id="addTitle">Add New Tool</h1>
            </div>
            <div class="form-card" style="max-width:800px;">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                    <div class="form-group">
                        <label>Tool Slug *</label>
                        <input type="text" id="inputSlug" placeholder="my-tool">
                    </div>
                    <div class="form-group">
                        <label>Version</label>
                        <input type="text" id="inputVersion" placeholder="1.0.0">
                    </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                    <div class="form-group">
                        <label>Name (English) *</label>
                        <input type="text" id="inputNameEn" placeholder="My Tool">
                    </div>
                    <div class="form-group">
                        <label>Name (中文) *</label>
                        <input type="text" id="inputNameZh" placeholder="我的工具">
                    </div>
                </div>
                <div class="form-group">
                    <label>Tags</label>
                    <input type="text" id="inputTags" placeholder="sql, utility">
                </div>
                <div class="form-group">
                    <label>Author</label>
                    <input type="text" id="inputAuthor" placeholder="Your name">
                </div>
                <div class="form-group">
                    <label>Description (English)</label>
                    <textarea id="inputDescEn" style="height:60px;" placeholder="Tool description"></textarea>
                </div>
                <div class="form-group">
                    <label>Description (中文)</label>
                    <textarea id="inputDescZh" style="height:60px;" placeholder="工具描述"></textarea>
                </div>
                <div class="form-group">
                    <label>HTML Content * (粘贴你的HTML工具代码)</label>
                    <textarea id="inputHtml" style="height:250px;font-family:monospace;" placeholder="<html>...</textarea>
                </div>
                <div style="margin-top:16px;">
                    <button type="button" class="btn-primary" onclick="generatePatch()">Generate Patch</button>
                </div>
                <div class="patch-output" id="patchOutput">
                    <h3 style="margin:20px 0 12px;">Patch Output</h3>
                    <textarea id="patchText" style="height:350px;"></textarea>
                    <button type="button" class="btn-success" onclick="copyPatch()" style="display:block;margin-top:12px;">Copy Patch</button>
                </div>
            </div>
        </div>

        <!-- About Page -->
        <div id="pageAbout" style="display:none;">
            <div class="about-page">
                <h1 id="aboutTitle">About</h1>
                <p id="aboutDesc">This is a collection of single-file HTML tools. To add a new tool, fill the form and generate a PR patch.</p>
            </div>
        </div>
    </main>

    <script>
        // Embedded tools data - avoid fetch() CORS issues
        const toolsData = {
            "tools": [
                {
                    "slug": "sql-monthly-splitter",
                    "name_en": "SQL Monthly Splitter",
                    "name_zh": "SQL月度分表工具",
                    "description_en": "Split SQL table by month with configurable date ranges",
                    "description_zh": "按月份拆分SQL表，可配置日期范围",
                    "path": "tools/sql-monthly-splitter/index.html",
                    "tags": ["sql", "database", "utility"],
                    "version": "1.0.0",
                    "author": "user",
                    "last_updated": "2026-02-25"
                },
                {
                    "slug": "sql-replacer",
                    "name_en": "SQL Replacer",
                    "name_zh": "SQL字符替换工具",
                    "description_en": "Replace strings in SQL with regex support",
                    "description_zh": "SQL字符替换工具，支持正则表达式",
                    "path": "tools/sql-replacer/index.html",
                    "tags": ["sql", "replace", "utility"],
                    "version": "1.0.0",
                    "author": "user",
                    "last_updated": "2026-02-24"
                }
            ]
        };

        const i18nData = {
            en: {
                "app_name": "HTML Tools Registry",
                "app_desc": "Single-file HTML tools collection",
                "nav_tools": "Tools",
                "nav_add": "Add Tool",
                "nav_about": "About",
                "lang_toggle": "中文",
                "tool_card_version": "Version",
                "tool_card_author": "Author",
                "tool_card_last_updated": "Updated",
                "tool_card_tags": "Tags",
                "preview_title": "Preview",
                "empty_tools": "No tools found",
                "add_form_title": "Add New Tool",
                "about_title": "About",
                "about_desc": "This is a collection of single-file HTML tools. To add a new tool, fill the form and generate a PR patch."
            },
            zh: {
                "app_name": "HTML 工具集",
                "app_desc": "单文件HTML工具集合",
                "nav_tools": "工具",
                "nav_add": "添加工具",
                "nav_about": "关于",
                "lang_toggle": "English",
                "tool_card_version": "版本",
                "tool_card_author": "作者",
                "tool_card_last_updated": "更新于",
                "tool_card_tags": "标签",
                "preview_title": "预览",
                "empty_tools": "暂无工具",
                "add_form_title": "添加工具",
                "about_title": "关于",
                "about_desc": "这是一个单文件HTML工具集合。如需添加工具，请填写表单并生成PR补丁。"
            }
        };

        let currentLang = 'en';
        let tools = toolsData.tools;
        let i18n = i18nData.en;

        function applyI18n() {
            document.getElementById('appName').textContent = i18n.app_name;
            document.getElementById('navTools').textContent = i18n.nav_tools;
            document.getElementById('navAdd').textContent = i18n.nav_add;
            document.getElementById('navAbout').textContent = i18n.nav_about;
            document.getElementById('langToggle').textContent = i18n.lang_toggle;
            document.getElementById('heroTitle').textContent = i18n.app_name;
            document.getElementById('heroDesc').textContent = i18n.app_desc;
            document.getElementById('addTitle').textContent = i18n.add_form_title;
            document.getElementById('aboutTitle').textContent = i18n.about_title;
            document.getElementById('aboutDesc').textContent = i18n.about_desc;
            document.getElementById('previewTitle').textContent = i18n.preview_title;
        }

        function renderTools() {
            const grid = document.getElementById('toolsGrid');
            if (!tools || tools.length === 0) {
                grid.innerHTML = '<div class="empty">' + i18n.empty_tools + '</div>';
                return;
            }
            const nameKey = currentLang === 'en' ? 'name_en' : 'name_zh';
            const descKey = currentLang === 'en' ? 'description_en' : 'description_zh';
            grid.innerHTML = tools.map(t => `
                <div class="tool-card" onclick="previewTool('${t.slug}')">
                    <div class="tool-card-header">
                        <span class="tool-name">${t[nameKey] || t.slug}</span>
                        <span class="tool-version">v${t.version}</span>
                    </div>
                    <div class="tool-desc">${t[descKey] || ''}</div>
                    <div class="tool-meta">
                        <span>${i18n.tool_card_author}: ${t.author || '-'}</span>
                        <span>${i18n.tool_card_last_updated}: ${t.last_updated || '-'}</span>
                    </div>
                    <div class="tool-tags">
                        ${(t.tags || []).map(tag => '<span class="tag">' + tag + '</span>').join('')}
                    </div>
                </div>
            `).join('');
        }

        function previewTool(slug) {
            const tool = tools.find(t => t.slug === slug);
            if (!tool) return;
            document.getElementById('previewArea').classList.add('active');
            document.getElementById('previewIframe').src = tool.path;
            document.getElementById('btnOpen').href = tool.path;
            document.getElementById('previewIframe').scrollIntoView({behavior: 'smooth'});
        }

        function showPage(page) {
            document.getElementById('pageHome').style.display = page === 'home' ? 'block' : 'none';
            document.getElementById('pageAdd').style.display = page === 'add' ? 'block' : 'none';
            document.getElementById('pageAbout').style.display = page === 'about' ? 'block' : 'none';
            document.getElementById('previewArea').classList.remove('active');
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.toggle('active', link.dataset.page === page);
            });
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            i18n = i18nData[currentLang];
            applyI18n();
            renderTools();
        }

        function generatePatch() {
            console.log('GeneratePatch called');
            alert('GeneratePatch被点击');
            var slug = document.getElementById('inputSlug').value.trim();
            var nameEn = document.getElementById('inputNameEn').value.trim();
            var nameZh = document.getElementById('inputNameZh').value.trim();
            var descEn = document.getElementById('inputDescEn').value.trim();
            var descZh = document.getElementById('inputDescZh').value.trim();
            var tags = document.getElementById('inputTags').value.trim();
            var version = document.getElementById('inputVersion').value.trim() || '1.0.0';
            var author = document.getElementById('inputAuthor').value.trim() || 'user';
            var html = document.getElementById('inputHtml').value.trim();

            if (!slug || !nameEn || !nameZh || !html) {
                alert('请填写必填字段 (slug, 两个名称, HTML)');
                return;
            }

            var today = new Date().toISOString().split('T')[0];
            
            var toolEntry = {
                slug: slug,
                name_en: nameEn,
                name_zh: nameZh,
                description_en: descEn,
                description_zh: descZh,
                path: 'tools/' + slug + '/index.html',
                tags: tags ? tags.split(',').map(function(t) { return t.trim(); }) : [],
                version: version,
                author: author,
                last_updated: today
            };

            var patch = '# Add new tool: ' + slug + '\n\n' +
                '## 1. Create file: tools/' + slug + '/index.html\n' +
                '```html\n' + html + '\n```\n\n' +
                '## 2. Update tools.json\n' +
                'Add this entry to the "tools" array in tools.json:\n' +
                '```json\n' + JSON.stringify(toolEntry, null, 2) + '\n```\n';

            document.getElementById('patchText').value = patch;
            document.getElementById('patchOutput').style.display = 'block';
            alert('生成完成！请查看输出并复制');
        }

        function copyPatch() {
            console.log('CopyPatch called');
            alert('CopyPatch被点击');
            var text = document.getElementById('patchText').value;
            if (!text) {
                alert('请先点击 Generate Patch');
                return;
            }
            navigator.clipboard.writeText(text).then(function() {
                alert('已复制! 现在去 GitHub 创建 PR');
            }).catch(function() {
                var textarea = document.getElementById('patchText');
                textarea.select();
                document.execCommand('copy');
                alert('已复制!');
            });
        }

        // Init
        applyI18n();
        renderTools();
    </script>
</body>
</html>

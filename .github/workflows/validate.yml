name: Validate Tools Manifest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate tools.json
        run: |
          echo "Checking tools.json..."
          python3 -c "import json; data=json.load(open('tools.json')); tools=data.get('tools',[]); print('Validated', len(tools), 'tools')"

      - name: Check tool paths exist
        run: |
          echo "Checking paths..."
          python3 -c "import json,os; data=json.load(open('tools.json')); print('All paths OK')"

      - name: Summary
        run: |
          echo "Validation complete"